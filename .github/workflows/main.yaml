name: OTF Testing
on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [firefox, chrome, edge] 
    steps:
      - name: Run test
        run: python tests/hello_aut.py ${{ env.URL }} ${{ matrix.browser }}
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Screenshot-${{ matrix.browser }} 
          path: screenshot.png

      - name: Selenium Preparation
        run: docker run --network=isolated -d -p 4444:4444 -p 7900:7900 -v /dev/shm:/dev/shm --name firefox-standalone selenium/standalone-firefox-chrome-edge:latest