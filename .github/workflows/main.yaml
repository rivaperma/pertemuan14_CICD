name: OTF Testing
on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, chrome, edge] 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Container name dibuat unik per browser

      - name: Selenium Preparation
        run: |
          PORT=4444
          if [ "${{ matrix.browser }}" == "chrome" ]; then PORT=4445; fi
          if [ "${{ matrix.browser }}" == "edge" ]; then PORT=4446; fi
          docker run -d -p $PORT:4444 -p 7900:7900 -v /dev/shm:/dev/shm --name selenium-${{ matrix.browser }} selenium/standalone-${{ matrix.browser }}:latest
          echo "TEST_PORT=$PORT" >> $GITHUB_ENV
          
      - name: Wait for Selenium
        run: |
          echo "Menunggu server Selenium siap..."
          sleep 15  # Memberi waktu ekstra 15 detik agar server benar-benar siap

      - name: Install Selenium client
        run: pip install -U selenium

      - name: Run test
        run: python tests/hello_aut.py http://localhost ${{ matrix.browser }}
      
      - name: Upload Artifact
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: Screenshot-${{ matrix.browser }} 
          path: screenshot.png

      - name: Stop Docker
        if: always()
        run: docker stop selenium-${{ matrix.browser }} || true