name: OTF Testing
on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [firefox, chrome, edge] 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Container name dibuat unik per browser
      - name: Selenium Preparation
        run: |
          docker run -d -p 4444:4444 -p 7900:7900 -v /dev/shm:/dev/shm --name selenium-${{ matrix.browser }} selenium/standalone-${{ matrix.browser }}:latest

      - name: Wait for Selenium Hub
        run: sh wait.sh

      - name: Install Selenium client
        run: pip install -U selenium

      - name: Run test
        run: python tests/hello_aut.py http://localhost ${{ matrix.browser }}
      
      - name: Upload Artifact
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: Screenshot-${{ matrix.browser }} 
          path: screenshot.png

      - name: Stop Docker
        if: always()
        run: docker stop selenium-${{ matrix.browser }} || true